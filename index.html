<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f7f4ff;color:#1a1a2e;min-height:100vh}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px 60px}
.api-bar{background:#120E1C;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.api-lbl{font-size:11px;font-weight:700;color:#9354ff;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;padding-top:10px;flex-shrink:0}
.api-field{flex:1;min-width:260px}
.api-inp{width:100%;padding:9px 14px;border:1.5px solid #3a2d5c;border-radius:8px;font-size:13px;font-family:'Poppins',sans-serif;outline:none;background:#1e1535;color:#e9ddff;transition:border-color .2s}
.api-inp:focus{border-color:#9354ff}
.api-inp::placeholder{color:#4a3d6a;font-size:12px}
.api-note{font-size:11px;color:#5a4d7a;margin-top:6px;line-height:1.5}
.api-note a{color:#9354ff;text-decoration:none}
.top-bar{background:#120E1C;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-radius:12px;margin-bottom:28px}
.top-logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:1px}
.top-tag{font-size:11px;color:#9354ff;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.steps{display:flex;align-items:center;margin-bottom:28px;background:#fff;border-radius:12px;padding:16px 24px;border:1px solid #ede9fe}
.stp{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.stp-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #ddd6fe;background:#f7f4ff;color:#9b97b2;transition:all .25s}
.stp.done .stp-dot{background:#9354ff;border-color:#9354ff;color:#fff}
.stp.active .stp-dot{background:#fff;border-color:#9354ff;color:#9354ff;box-shadow:0 0 0 4px #e9ddff}
.stp-lbl{font-size:10px;color:#9b97b2;font-weight:500;text-align:center;white-space:nowrap}
.stp.active .stp-lbl{color:#9354ff;font-weight:600}
.stp.done .stp-lbl{color:#9354ff}
.stp-line{flex:1;height:2px;background:#ede9fe;margin:0 4px;margin-bottom:18px}
.stp-line.done{background:#9354ff}
.card{background:#fff;border-radius:14px;border:1px solid #ede9fe;padding:24px 26px;margin-bottom:18px}
.card-hd{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.card-hd-icon{width:32px;height:32px;background:#9354ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.section-ttl{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.section-sub{font-size:13px;color:#7a6f9b;margin-bottom:24px}
.lbl{display:block;font-size:11px;font-weight:600;color:#7a6f9b;margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.inp{width:100%;padding:9px 13px;border:1.5px solid #ddd6fe;border-radius:8px;font-size:13px;font-family:'Poppins',sans-serif;outline:none;background:#fff;color:#1a1a2e;transition:border-color .2s}
.inp:focus{border-color:#9354ff;box-shadow:0 0 0 3px #f0ebff}
.inp::placeholder{color:#c4b5f5}
.ta{resize:vertical;min-height:72px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fld{margin-bottom:14px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;border:1.5px solid #ddd6fe;background:#f7f4ff;color:#9354ff;font-family:'Poppins',sans-serif;transition:all .15s;user-select:none}
.chip:hover{border-color:#9354ff}
.chip.on{background:#9354ff;color:#fff;border-color:#9354ff}
.upload-box{border:2px dashed #ddd6fe;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#faf8ff;transition:all .2s;position:relative}
.upload-box:hover{border-color:#9354ff;background:#f0ebff}
.upload-icon{font-size:24px;margin-bottom:6px}
.upload-ttl{font-size:13px;font-weight:600;color:#9354ff}
.upload-sub{font-size:11px;color:#a89fc4;margin-top:3px}
.upload-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-list{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.file-tag{display:inline-flex;align-items:center;gap:6px;background:#e9ddff;color:#9354ff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:500}
.file-rm{cursor:pointer;font-size:13px;color:#7a3de0;font-weight:700;background:none;border:none;padding:0;line-height:1;font-family:'Poppins',sans-serif}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.metric-box{background:#f7f4ff;border:1px solid #ede9fe;border-radius:8px;padding:12px}
.metric-lbl{font-size:10px;font-weight:600;color:#9b97b2;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.metric-inp{width:100%;border:none;background:transparent;font-size:18px;font-weight:700;color:#9354ff;font-family:'Poppins',sans-serif;outline:none}
.metric-inp::placeholder{color:#d4c5f5;font-size:13px;font-weight:400}
.currency-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.cur-btn{border:1.5px solid #ddd6fe;border-radius:10px;padding:10px 8px;cursor:pointer;background:#f7f4ff;transition:all .18s;text-align:center;font-family:'Poppins',sans-serif}
.cur-btn:hover{border-color:#9354ff;background:#f0ebff}
.cur-btn.sel{border-color:#9354ff;background:#9354ff}
.cur-flag{font-size:20px;display:block;margin-bottom:3px}
.cur-code{font-size:13px;font-weight:700;color:#1a1a2e;display:block}
.cur-btn.sel .cur-code,.cur-btn.sel .cur-sym{color:#fff}
.cur-name{font-size:9px;color:#9b97b2;display:block;margin-top:1px}
.cur-btn.sel .cur-name{color:#e9ddff}
.cur-sym{font-size:10px;font-weight:600;color:#9354ff;display:block;margin-top:2px}
.pkg-hd{display:grid;grid-template-columns:2fr 1.2fr 1fr 2.5fr 36px;gap:10px;margin-bottom:5px}
.pkg-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 2.5fr 36px;gap:10px;align-items:center;margin-bottom:9px}
.pkg-lbl{font-size:10px;font-weight:600;color:#9b97b2;text-transform:uppercase;letter-spacing:.4px;padding:0 4px}
.add-btn{background:#e9ddff;color:#9354ff;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;margin-top:4px}
.add-btn:hover{background:#ddd6fe}
.rm-btn{background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:6px;font-size:12px;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;width:36px}
.btn-p{background:#9354ff;color:#fff;border:none;border-radius:9px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;transition:background .2s}
.btn-p:hover{background:#7a3de0}
.btn-p:disabled{background:#c4b5f5;cursor:not-allowed}
.btn-s{background:#e9ddff;color:#9354ff;border:none;border-radius:9px;padding:12px 22px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Poppins',sans-serif}
.btn-s:hover{background:#ddd6fe}
.nav-row{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px}
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.review-card{background:#f7f4ff;border:1px solid #ede9fe;border-radius:10px;padding:14px 16px}
.review-ttl{font-size:11px;font-weight:700;color:#9354ff;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.rv-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;border-bottom:1px solid #ede9fe;padding-bottom:5px;gap:8px}
.rv-k{color:#7a6f9b;font-weight:500;flex-shrink:0}
.rv-v{color:#1a1a2e;font-weight:600;text-align:right;word-break:break-word}
.gen-area{text-align:center;padding:56px 20px}
.spinner{width:48px;height:48px;border:3px solid #e9ddff;border-top-color:#9354ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-ttl{font-size:18px;font-weight:700;color:#9354ff;margin-bottom:8px}
.gen-sub{font-size:13px;color:#7a6f9b;line-height:1.6}
.success-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:28px;text-align:center;margin:16px 0}
.success-ico{font-size:40px;margin-bottom:12px}
.success-ttl{font-size:18px;font-weight:700;color:#166534;margin-bottom:6px}
.success-sub{font-size:13px;color:#166534;opacity:.85;line-height:1.6}
.error-box{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:16px;color:#dc2626;font-size:13px;margin:14px 0;text-align:center;line-height:1.6;word-break:break-word}
@media(max-width:640px){
  .r2,.metric-grid,.review-grid{grid-template-columns:1fr}
  .currency-grid{grid-template-columns:repeat(2,1fr)}
  .pkg-hd,.pkg-row{grid-template-columns:1fr 1fr 36px}
}
</style>
</head>

<script>
(function(){

var state={

  presentationDate:new Date().toISOString().split('T')[0],
  languages:[],locations:'',audience:'',preferredKeywords:'',seoObjectives:[],
  seoFiles:[],organicTraffic:'',organicKeywords:'',domainRating:'',backlinks:'',referringDomains:'',seoAuditNotes:'',
  geoFiles:[],chatgptCitations:'',geminiCitations:'',perplexityCitations:'',copilotCitations:'',geoAuditNotes:'',
  currency:CURRENCIES[0],
  commercialFiles:[],packages:[{name:'',price:'',hours:'',features:''}],commercialNotes:'',
  status:'idle',errorMsg:''
};
function mk(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}
function inp(val,key,ph,type){var e=mk('input','inp');e.type=type||'text';e.value=val||'';e.placeholder=ph||'';e.addEventListener('input',function(ev){state[key]=ev.target.value;});return e;}
function ta(val,key,ph){var e=mk('textarea','inp ta');e.value=val||'';e.placeholder=ph||'';e.addEventListener('input',function(ev){state[key]=ev.target.value;});return e;}
function fld(label,child){var d=mk('div','fld');if(label){var l=mk('label','lbl');l.textContent=label;d.appendChild(l);}d.appendChild(child);return d;}
function r2(){var d=mk('div','r2');for(var i=0;i<arguments.length;i++)d.appendChild(arguments[i]);return d;}
function chipGroup(opts,key){
  var w=mk('div','chip-wrap');
  opts.forEach(function(opt){
    var c=mk('span','chip'+(state[key].indexOf(opt)>=0?' on':''));
    c.textContent=opt;
    c.addEventListener('click',(function(o){return function(){var i=state[key].indexOf(o);if(i>=0)state[key].splice(i,1);else state[key].push(o);render();};})(opt));
    w.appendChild(c);
  });
  return w;
}
function uploadBox(key,accept,label){
  var box=mk('div','upload-box');
  box.innerHTML='<div class="upload-icon">📎</div><div class="upload-ttl">'+label+'</div><div class="upload-sub">PDF, PNG, JPG — multiple files allowed</div>';
  var fi=mk('input','upload-input');fi.type='file';fi.accept=accept;fi.multiple=true;
  fi.addEventListener('change',function(ev){Array.from(ev.target.files).forEach(function(f){state[key].push(f);});render();});
  box.appendChild(fi);
  if(state[key].length){
    var list=mk('div','file-list');
    state[key].forEach(function(f,i){
      var tag=mk('span','file-tag');tag.textContent=f.name+' ';
      var rm=mk('button','file-rm');rm.textContent='✕';
      (function(idx,k){rm.addEventListener('click',function(ev){ev.stopPropagation();state[k].splice(idx,1);render();});})(i,key);
      tag.appendChild(rm);list.appendChild(tag);
    });
    box.appendChild(list);
  }
  return box;
}
function navRow(back,lbl,fn,ok){
  var d=mk('div','nav-row');
  if(back){var b=mk('button','btn-s');b.textContent='← Back';b.addEventListener('click',function(){state.step--;render();});d.appendChild(b);}
  else d.appendChild(mk('span'));
  var n=mk('button','btn-p');n.textContent=lbl||'Next →';if(!ok)n.disabled=true;n.addEventListener('click',fn||function(){state.step++;render();});d.appendChild(n);
  return d;
}
function rvRow(k,v){var r=mk('div','rv-row');var kk=mk('span','rv-k');kk.textContent=k;var vv=mk('span','rv-v');vv.textContent=v;r.appendChild(kk);r.appendChild(vv);return r;}
/* PPTX */
var P={purple:'9354ff',light:'e9ddff',dark:'120E1C',white:'FFFFFF',lb:'F5F2FF',bd:'DDD6FE'};
function hdr(s,pptx,t){s.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:10,h:.88,fill:{color:P.purple},line:{color:P.purple,width:0}});s.addText(t,{x:.35,y:.08,w:9.3,h:.72,fontSize:20,bold:true,color:P.white,fontFace:'Poppins',valign:'middle'});}
function makeCover(pptx,c,fd){var s=pptx.addSlide();s.background={color:P.dark};s.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:.2,h:5.625,fill:{color:P.purple},line:{color:P.purple,width:0}});s.addShape(pptx.shapes.RECTANGLE,{x:0,y:5,w:10,h:.625,fill:{color:P.purple},line:{color:P.purple,width:0}});s.addShape(pptx.shapes.OVAL,{x:6.8,y:-1.2,w:5.2,h:5.2,fill:{color:P.purple,transparency:90},line:{color:P.purple,width:0}});s.addShape(pptx.shapes.OVAL,{x:7.8,y:2.8,w:3,h:3,fill:{color:P.purple,transparency:93},line:{color:P.purple,width:0}});s.addText('CONSULT. STRATEGISE. EXECUTE.',{x:.5,y:.28,w:9,h:.32,fontSize:8,color:P.light,fontFace:'Poppins',charSpacing:3});s.addText(fd.clientName||'Client Name',{x:.5,y:.75,w:8.5,h:1.5,fontSize:48,bold:true,color:P.white,fontFace:'Poppins'});s.addText('SEO & GEO STRATEGY PROPOSAL',{x:.5,y:2.45,w:8,h:.6,fontSize:18,bold:true,color:P.purple,fontFace:'Poppins',charSpacing:1});s.addText((c.cover&&c.cover.tagline)||'Driving organic growth through intelligent search strategy.',{x:.5,y:3.18,w:7.5,h:.55,fontSize:13,color:'BDB4CC',fontFace:'Poppins',italic:true});var dt=fd.presentationDate?new Date(fd.presentationDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'';s.addText(dt,{x:.5,y:4.1,w:4,h:.3,fontSize:10.5,color:'8B7EAB',fontFace:'Poppins'});s.addText('Prepared by NEXA',{x:.5,y:4.42,w:5,h:.3,fontSize:10,color:'7A6B94',fontFace:'Poppins'});s.addText('NEXA',{x:7.6,y:5.04,w:2.1,h:.5,fontSize:20,bold:true,color:P.white,fontFace:'Poppins',align:'center'});}
function makeDivider(pptx,title,sub){var s=pptx.addSlide();s.background={color:P.purple};s.addShape(pptx.shapes.OVAL,{x:6.2,y:-.9,w:5.8,h:5.8,fill:{color:P.white,transparency:93},line:{color:P.white,width:0}});s.addShape(pptx.shapes.OVAL,{x:-.5,y:3.5,w:3,h:3,fill:{color:P.white,transparency:95},line:{color:P.white,width:0}});s.addShape(pptx.shapes.RECTANGLE,{x:0,y:0,w:.14,h:5.625,fill:{color:P.white},line:{color:P.white,width:0}});s.addText(title,{x:.5,y:1.8,w:9,h:1.3,fontSize:38,bold:true,color:P.white,fontFace:'Poppins'});if(sub)s.addText(sub,{x:.5,y:3.22,w:8,h:.6,fontSize:14,color:P.light,fontFace:'Poppins',italic:true});}
function makeObjectives(pptx,objs){var s=pptx.addSlide();s.background={color:P.white};hdr(s,pptx,'Core Objectives');objs.slice(0,4).forEach(function(o,i){var col=i%2,row=Math.floor(i/2),x=.28+col*4.88,y=1.02+row*2.25,w=4.52,h=2;s.addShape(pptx.shapes.RECTANGLE,{x:x,y:y,w:w,h:h,fill:{color:P.lb},line:{color:P.bd,width:.75}});s.addShape(pptx.shapes.RECTANGLE,{x:x,y:y,w:.07,h:h,fill:{color:P.purple},line:{color:P.purple,width:0}});s.addShape(pptx.shapes.OVAL,{x:x+.18,y:y+.17,w:.42,h:.42,fill:{color:P.purple},line:{color:P.purple,width:0}});s.addText(String(i+1),{x:x+.18,y:y+.17,w:.42,h:.42,fontSize:12,bold:true,color:P.white,fontFace:'Poppins',align:'center',valign:'middle'});s.addText(o.title,{x:x+.72,y:y+.2,w:w-.85,h:.38,fontSize:11,bold:true,color:'222222',fontFace:'Poppins'});s.addText(o.description,{x:x+.18,y:y+.68,w:w-.3,h:1.2,fontSize:9.5,color:'555555',fontFace:'Poppins'});});}

function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onerror=rej;
    r.onload=function(){
      var img=new Image();
      img.onerror=rej;
      img.onload=function(){
        var MAX=1568;
        var w=img.width,h=img.height;
        if(w<=MAX&&h<=MAX){res(r.result.split(',')[1]);return;}
        var scale=Math.min(MAX/w,MAX/h);
        var cw=Math.round(w*scale),ch=Math.round(h*scale);
        var canvas=document.createElement('canvas');
        canvas.width=cw;canvas.height=ch;
        var ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,cw,ch);
        res(canvas.toDataURL('image/jpeg',0.85).split(',')[1]);
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}

  var root=document.getElementById('root');root.innerHTML='';
  var wrap=mk('div','wrap');
  wrap.appendChild(mk('div','top-bar','<div><span class="top-logo">NEXA</span></div><div class="top-tag">Pitch Deck Generator</div>'));
  /* API bar */
  var sk='';try{sk=sessionStorage.getItem('nexa_ak')||'';}catch(e){}
  var ab=mk('div','api-bar');
  var al=mk('span','api-lbl');al.textContent='API Key';
  var af=mk('div','api-field');
  var ai=mk('input','api-inp');ai.type='password';ai.id='nexa-api-key';ai.placeholder='sk-ant-api03-...';ai.value=sk;
  ai.addEventListener('input',function(ev){try{sessionStorage.setItem('nexa_ak',ev.target.value);}catch(e){}});
  var an=mk('div','api-note');an.innerHTML='Required to generate slides. Get yours at <a href="https://console.anthropic.com/account/keys" target="_blank">console.anthropic.com/account/keys</a> — stored in this tab only.';
  af.appendChild(ai);af.appendChild(an);ab.appendChild(al);ab.appendChild(af);wrap.appendChild(ab);
  /* Steps */
  var sd=mk('div','steps');
  STEPS.forEach(function(name,i){
    if(i>0){var ln=mk('div','stp-line'+(i<=state.step?' done':''));sd.appendChild(ln);}
    var stp=mk('div','stp'+(i===state.step?' active':i<state.step?' done':''));
    var dot=mk('div','stp-dot');dot.textContent=i<state.step?'✓':String(i+1);
    var lbl=mk('div','stp-lbl');lbl.textContent=name;
    stp.appendChild(dot);stp.appendChild(lbl);sd.appendChild(stp);
  });
  wrap.appendChild(sd);
  if(state.step===0)s1(wrap);else if(state.step===1)s2(wrap);else if(state.step===2)s3(wrap);else if(state.step===3)s4(wrap);else s5(wrap);
  root.appendChild(wrap);
}
function s1(w){
  var hd=mk('div');hd.innerHTML='<div class="section-ttl">Strategy & Client Details</div><div class="section-sub">Tell us about the client and their SEO objectives.</div>';w.appendChild(hd);
  var c1=mk('div','card');c1.appendChild(mk('div','card-hd','<div class="card-hd-icon">🏢</div> Client Information'));c1.appendChild(r2(fld('Client / Company Name',inp(state.clientName,'clientName','e.g. Kempner Finance')),fld('Industry / Sector',inp(state.clientIndustry,'clientIndustry','e.g. Financial Services'))));c1.appendChild(r2(fld('Website URL',inp(state.websiteUrl,'websiteUrl','https://example.com')),fld('Presentation Date',inp(state.presentationDate,'presentationDate','','date'))));w.appendChild(c1);
  var c2=mk('div','card');c2.appendChild(mk('div','card-hd','<div class="card-hd-icon">🎯</div> Targeting & Scope'));c2.appendChild(fld('Target Locations',inp(state.locations,'locations','e.g. UAE, United Kingdom, Saudi Arabia')));c2.appendChild(fld('Target Audience',inp(state.audience,'audience','e.g. C-suite executives, SME owners')));c2.appendChild(fld('Preferred Keywords',ta(state.preferredKeywords,'preferredKeywords','e.g. financial planning, wealth advisory')));w.appendChild(c2);
  var c3=mk('div','card');c3.appendChild(mk('div','card-hd','<div class="card-hd-icon">🌍</div> Target Languages'));c3.appendChild(chipGroup(LANGS,'languages'));w.appendChild(c3);
  var c4=mk('div','card');c4.appendChild(mk('div','card-hd','<div class="card-hd-icon">📌</div> SEO Objectives'));c4.appendChild(chipGroup(OBJS,'seoObjectives'));w.appendChild(c4);
  w.appendChild(navRow(false,'Next: SEO Audit →',null,state.clientName.trim().length>1&&state.websiteUrl.trim().length>5));
}
function s2(w){
  var hd=mk('div');hd.innerHTML='<div class="section-ttl">SEO Technical Audit</div><div class="section-sub">Upload Ahrefs / SEMrush reports and enter key metrics.</div>';w.appendChild(hd);
  var c1=mk('div','card');c1.appendChild(mk('div','card-hd','<div class="card-hd-icon">📊</div> Upload Audit Report'));var n1=mk('p');n1.textContent='Upload screenshots or exports from Ahrefs, SEMrush, or Google Search Console.';n1.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:12px';c1.appendChild(n1);c1.appendChild(uploadBox('seoFiles','image/*,.pdf','Click or drag to upload SEO audit files'));w.appendChild(c1);
  var c2=mk('div','card');c2.appendChild(mk('div','card-hd','<div class="card-hd-icon">📈</div> Key Metrics (Optional)'));var n2=mk('p');n2.textContent='These appear as data cards on the audit slide.';n2.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:14px';c2.appendChild(n2);
  var mg=mk('div','metric-grid');[['Monthly Organic Traffic','organicTraffic','e.g. 12,400'],['Organic Keywords','organicKeywords','e.g. 3,200'],['Domain Rating (DR)','domainRating','e.g. 42'],['Total Backlinks','backlinks','e.g. 8,500'],['Referring Domains','referringDomains','e.g. 310']].forEach(function(a){var mb=mk('div','metric-box');var ml=mk('div','metric-lbl');ml.textContent=a[0];mb.appendChild(ml);var mi=mk('input','metric-inp');mi.type='text';mi.value=state[a[1]]||'';mi.placeholder=a[2];mi.addEventListener('input',(function(k){return function(ev){state[k]=ev.target.value;};})(a[1]));mb.appendChild(mi);mg.appendChild(mb);});
  c2.appendChild(mg);c2.appendChild(fld('Additional Notes',ta(state.seoAuditNotes,'seoAuditNotes','Known issues, context...')));w.appendChild(c2);
  w.appendChild(navRow(true,'Next: GEO Audit →',null,true));
}
function s3(w){
  var hd=mk('div');hd.innerHTML='<div class="section-ttl">GEO / AI Presence Audit</div><div class="section-sub">How visible is the client in AI-generated answers today?</div>';w.appendChild(hd);
  var c1=mk('div','card');c1.appendChild(mk('div','card-hd','<div class="card-hd-icon">🤖</div> Upload GEO Audit Report'));var n1=mk('p');n1.textContent='Upload WriteSonic GEO exports or screenshots from AI tools.';n1.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:12px';c1.appendChild(n1);c1.appendChild(uploadBox('geoFiles','image/*,.pdf','Click or drag to upload GEO audit files'));w.appendChild(c1);
  var c2=mk('div','card');c2.appendChild(mk('div','card-hd','<div class="card-hd-icon">💬</div> AI Citation Counts'));var n2=mk('p');n2.textContent='Enter how many times the brand is cited across AI platforms.';n2.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:14px';c2.appendChild(n2);
  var mg=mk('div','metric-grid');[['ChatGPT Citations','chatgptCitations','e.g. 12'],['Google Gemini','geminiCitations','e.g. 5'],['Perplexity AI','perplexityCitations','e.g. 8'],['MS Copilot','copilotCitations','e.g. 3']].forEach(function(a){var mb=mk('div','metric-box');var ml=mk('div','metric-lbl');ml.textContent=a[0];mb.appendChild(ml);var mi=mk('input','metric-inp');mi.type='text';mi.value=state[a[1]]||'';mi.placeholder=a[2];mi.addEventListener('input',(function(k){return function(ev){state[k]=ev.target.value;};})(a[1]));mb.appendChild(mi);mg.appendChild(mb);});
  c2.appendChild(mg);c2.appendChild(fld('Additional Notes',ta(state.geoAuditNotes,'geoAuditNotes','Competitor AI presence, observations...')));w.appendChild(c2);
  w.appendChild(navRow(true,'Next: Commercials →',null,true));
}
function s4(w){
  var hd=mk('div');hd.innerHTML='<div class="section-ttl">Commercial Proposal</div><div class="section-sub">Select a currency and define pricing packages.</div>';w.appendChild(hd);
  var cc=mk('div','card');cc.appendChild(mk('div','card-hd','<div class="card-hd-icon">💱</div> Proposal Currency'));var cn=mk('p');cn.textContent='Default is AED — change as needed per client location.';cn.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:14px';cc.appendChild(cn);
  var cg=mk('div','currency-grid');CURRENCIES.forEach(function(cur){var sel=state.currency.code===cur.code;var btn=mk('div','cur-btn'+(sel?' sel':''));btn.innerHTML='<span class="cur-flag">'+cur.flag+'</span><span class="cur-code">'+cur.code+'</span><span class="cur-name">'+cur.name+'</span><span class="cur-sym">'+cur.sign.trim()+'</span>';btn.addEventListener('click',(function(c){return function(){state.currency=c;render();};})(cur));cg.appendChild(btn);});cc.appendChild(cg);w.appendChild(cc);
  var c1=mk('div','card');c1.appendChild(mk('div','card-hd','<div class="card-hd-icon">📁</div> Upload Pricing Calculator'));var un=mk('p');un.textContent='Upload the NEXA pricing calculator output or any commercial reference files.';un.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:12px';c1.appendChild(un);c1.appendChild(uploadBox('commercialFiles','image/*,.pdf,.xlsx','Click or drag to upload commercial files'));w.appendChild(c1);
  var c2=mk('div','card');c2.innerHTML='<div class="card-hd"><div class="card-hd-icon" style="background:#7a3de0;font-size:18px">'+state.currency.flag+'</div> Package Builder <span style="font-size:11px;font-weight:500;color:#9b97b2;margin-left:6px">in '+state.currency.code+' ('+state.currency.sign.trim()+')</span></div>';
  var pn=mk('p');pn.textContent='Define 2-4 packages. The middle package is highlighted as Recommended.';pn.style.cssText='font-size:12px;color:#7a6f9b;margin-bottom:12px';c2.appendChild(pn);
  var ph=mk('div','pkg-hd');['Package Name','Price ('+state.currency.sign.trim()+'/mo)','Hrs/mo','Key Features',''].forEach(function(h){var d=mk('div','pkg-lbl');d.textContent=h;ph.appendChild(d);});c2.appendChild(ph);
  state.packages.forEach(function(pkg,i){
    var row=mk('div','pkg-row');
    var ni=mk('input','inp');ni.value=pkg.name;ni.placeholder='e.g. Growth';ni.addEventListener('input',(function(idx){return function(ev){state.packages[idx].name=ev.target.value;};})(i));
    var pi=mk('input','inp');pi.value=pkg.price;pi.placeholder='10,000';pi.addEventListener('input',(function(idx){return function(ev){state.packages[idx].price=ev.target.value;};})(i));
    var hi=mk('input','inp');hi.value=pkg.hours;hi.placeholder='20';hi.addEventListener('input',(function(idx){return function(ev){state.packages[idx].hours=ev.target.value;};})(i));
    var fi=mk('input','inp');fi.value=pkg.features;fi.placeholder='Technical SEO, Content...';fi.addEventListener('input',(function(idx){return function(ev){state.packages[idx].features=ev.target.value;};})(i));
    var rm=mk('button','rm-btn');rm.textContent='✕';rm.addEventListener('click',(function(idx){return function(){if(state.packages.length>1){state.packages.splice(idx,1);render();}};})(i));
    [ni,pi,hi,fi,rm].forEach(function(e){row.appendChild(e);});c2.appendChild(row);
  });
  if(state.packages.length<4){var ab=mk('button','add-btn');ab.textContent='+ Add Package';ab.addEventListener('click',function(){state.packages.push({name:'',price:'',hours:'',features:''});render();});c2.appendChild(ab);}
  var sp=mk('div');sp.style.marginTop='14px';c2.appendChild(sp);
  c2.appendChild(fld('Commercial Notes',ta(state.commercialNotes,'commercialNotes','Contract terms, discounts...')));
  w.appendChild(c2);
  w.appendChild(navRow(true,'Review & Generate →',null,true));
}
function s5(w){
  var hd=mk('div');hd.innerHTML='<div class="section-ttl">Review & Generate</div><div class="section-sub">Confirm the details below, then generate the PPTX.</div>';w.appendChild(hd);
  if(state.status==='generating'){var ga=mk('div','gen-area');ga.innerHTML='<div class="spinner"></div><div class="gen-ttl">Generating your pitch deck…</div><div class="gen-sub">Claude AI is writing slide content and building your PPTX.<br>This takes around 20–40 seconds.</div>';w.appendChild(ga);return;}
  if(state.status==='success'){
    var sb=mk('div','success-box');sb.innerHTML='<div class="success-ico">✅</div><div class="success-ttl">Pitch Deck Generated!</div><div class="success-sub">Your <strong>'+state.clientName+' SEO &amp; GEO Proposal.pptx</strong> has been downloaded.<br>Open it in PowerPoint or Google Slides to review.</div>';w.appendChild(sb);
    var nr=mk('div','nav-row');nr.style.cssText='margin-top:8px;justify-content:center;gap:14px';
    var ag=mk('button','btn-p');ag.textContent='🔄  Generate Again';ag.addEventListener('click',function(){state.status='idle';render();});
    var nb=mk('button','btn-s');nb.textContent='+ New Proposal';nb.addEventListener('click',function(){Object.assign(state,{step:0,clientName:'',clientIndustry:'',websiteUrl:'',presentationDate:new Date().toISOString().split('T')[0],languages:[],locations:'',audience:'',preferredKeywords:'',seoObjectives:[],seoFiles:[],organicTraffic:'',organicKeywords:'',domainRating:'',backlinks:'',referringDomains:'',seoAuditNotes:'',geoFiles:[],chatgptCitations:'',geminiCitations:'',perplexityCitations:'',copilotCitations:'',geoAuditNotes:'',currency:CURRENCIES[0],commercialFiles:[],packages:[{name:'',price:'',hours:'',features:''}],commercialNotes:'',status:'idle',errorMsg:''});render();});
    nr.appendChild(ag);nr.appendChild(nb);w.appendChild(nr);return;
  }
  var rg=mk('div','review-grid');
  var rc1=mk('div','review-card');rc1.appendChild(mk('div','review-ttl','Client & Strategy'));[['Client',state.clientName||'—'],['Industry',state.clientIndustry||'—'],['Website',state.websiteUrl||'—'],['Date',state.presentationDate||'—'],['Locations',state.locations||'—'],['Languages',state.languages.join(', ')||'—'],['Objectives',state.seoObjectives.join(', ')||'—']].forEach(function(a){rc1.appendChild(rvRow(a[0],a[1]));});rg.appendChild(rc1);
  var rc2=mk('div','review-card');rc2.appendChild(mk('div','review-ttl','SEO Audit'));[['Files',state.seoFiles.length+' file(s)'],['Traffic',state.organicTraffic||'—'],['Keywords',state.organicKeywords||'—'],['DR',state.domainRating||'—'],['Backlinks',state.backlinks||'—']].forEach(function(a){rc2.appendChild(rvRow(a[0],a[1]));});rg.appendChild(rc2);
  var rc3=mk('div','review-card');rc3.appendChild(mk('div','review-ttl','GEO Audit'));[['Files',state.geoFiles.length+' file(s)'],['ChatGPT',state.chatgptCitations||'0'],['Gemini',state.geminiCitations||'0'],['Perplexity',state.perplexityCitations||'0'],['Copilot',state.copilotCitations||'0']].forEach(function(a){rc3.appendChild(rvRow(a[0],a[1]));});rg.appendChild(rc3);
  var rc4=mk('div','review-card');rc4.appendChild(mk('div','review-ttl','Currency & Packages'));rc4.appendChild(rvRow('Currency',state.currency.flag+' '+state.currency.code));var vp=state.packages.filter(function(p){return p.name;});if(vp.length){vp.forEach(function(p){rc4.appendChild(rvRow(p.name,state.currency.sign.trim()+p.price+'/mo'));});}else{var np=mk('div');np.style.cssText='font-size:12px;color:#a89fc4;padding:6px 0';np.textContent='No packages — AI will suggest';rc4.appendChild(np);}rg.appendChild(rc4);
  w.appendChild(rg);
  if(state.status==='error'){var eb=mk('div','error-box');eb.textContent='⚠️ '+state.errorMsg;w.appendChild(eb);}
  var nr2=mk('div','nav-row');nr2.style.marginTop='18px';
  var bk=mk('button','btn-s');bk.textContent='← Edit';bk.addEventListener('click',function(){state.step=3;render();});nr2.appendChild(bk);
  var gb=mk('button','btn-p');gb.textContent='🎨  Generate Pitch Deck PPTX';
  if(!(state.clientName.trim().length>1&&state.websiteUrl.trim().length>5))gb.disabled=true;
  gb.addEventListener('click',async function(){
    state.status='generating';state.errorMsg='';render();
    try{await generatePres(state);state.status='success';}
    catch(e){state.status='error';state.errorMsg=e.message||'Unknown error. See browser console.';}
    render();
  });
  nr2.appendChild(gb);w.appendChild(nr2);
}
render();
})();
</script>
